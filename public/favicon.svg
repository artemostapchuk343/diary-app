<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
    <clipPath id="clip">
      <rect width="100" height="100" rx="22"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="#0e1310"/>

  <!-- Subtle background glow -->
  <g clip-path="url(#clip)">
    <ellipse cx="-2" cy="102" rx="72" ry="60" fill="#134525" opacity="0.8" filter="url(#glow)"/>
    <ellipse cx="106" cy="-2" rx="60" ry="60" fill="#225234" opacity="0.6" filter="url(#glow)"/>
  </g>

  <!-- Left tall panel block -->
  <rect x="11" y="15" width="36" height="70" rx="7" fill="#1e5e32" opacity="0.75"/>
  <rect x="11" y="15" width="36" height="70" rx="7" fill="none" stroke="#b0dcc4" stroke-width="1.5" opacity="0.4"/>

  <!-- Top-right panel block -->
  <rect x="54" y="15" width="35" height="31" rx="7" fill="#1a5230" opacity="0.75"/>
  <rect x="54" y="15" width="35" height="31" rx="7" fill="none" stroke="#b0dcc4" stroke-width="1.5" opacity="0.4"/>

  <!-- Bottom-right panel block -->
  <rect x="54" y="54" width="35" height="31" rx="7" fill="#1a5230" opacity="0.75"/>
  <rect x="54" y="54" width="35" height="31" rx="7" fill="none" stroke="#b0dcc4" stroke-width="1.5" opacity="0.4"/>

  <!-- Mini bar chart in left panel (readable at medium sizes) -->
  <rect x="17" y="60" width="7" height="17" rx="2" fill="#b0dcc4" opacity="0.8"/>
  <rect x="26" y="50" width="7" height="27" rx="2" fill="#b0dcc4" opacity="0.65"/>
  <rect x="35" y="55" width="7" height="22" rx="2" fill="#b0dcc4" opacity="0.5"/>
</svg>
