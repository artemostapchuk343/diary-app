<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <filter id="bg-glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="point-glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <clipPath id="clip">
      <rect width="100" height="100" rx="22"/>
    </clipPath>
  </defs>

  <!-- Very dark background — near-black with faint green tint -->
  <rect width="100" height="100" rx="22" fill="#070c08"/>

  <!-- Barely-there depth blobs -->
  <g clip-path="url(#clip)">
    <ellipse cx="10" cy="90" rx="65" ry="55" fill="#0f2816" opacity="0.45" filter="url(#bg-glow)"/>
    <ellipse cx="90" cy="12" rx="55" ry="52" fill="#112011" opacity="0.35" filter="url(#bg-glow)"/>
  </g>

  <!-- Compass outer ring — thin, subtle -->
  <circle cx="50" cy="50" r="35" fill="none" stroke="#e8f4ec" stroke-width="0.9" opacity="0.18"/>

  <!-- Tick marks at the 4 diagonals (45°, 135°, 225°, 315°) -->
  <!-- Each tick: a short line from r=33 to r=36 at that angle -->
  <line x1="73.7" y1="26.3" x2="76.0" y2="24.0" stroke="#e8f4ec" stroke-width="1.2" opacity="0.3" stroke-linecap="round"/>
  <line x1="73.7" y1="73.7" x2="76.0" y2="76.0" stroke="#e8f4ec" stroke-width="1.2" opacity="0.3" stroke-linecap="round"/>
  <line x1="26.3" y1="73.7" x2="24.0" y2="76.0" stroke="#e8f4ec" stroke-width="1.2" opacity="0.3" stroke-linecap="round"/>
  <line x1="26.3" y1="26.3" x2="24.0" y2="24.0" stroke="#e8f4ec" stroke-width="1.2" opacity="0.3" stroke-linecap="round"/>

  <!-- NORTH point — bright green, slightly longer -->
  <path d="M50 15 L55.5 50 L50 43 L44.5 50 Z" fill="#6dba88"/>
  <!-- Subtle glow behind north point -->
  <path d="M50 15 L55.5 50 L50 43 L44.5 50 Z" fill="#6dba88" filter="url(#point-glow)" opacity="0.5"/>

  <!-- SOUTH point — white, slightly shorter -->
  <path d="M50 85 L54.5 50 L50 57 L45.5 50 Z" fill="#e8f4ec" opacity="0.7"/>

  <!-- EAST point — white, narrower -->
  <path d="M85 50 L50 44.5 L57 50 L50 55.5 Z" fill="#e8f4ec" opacity="0.55"/>

  <!-- WEST point — white, narrower -->
  <path d="M15 50 L50 55.5 L43 50 L50 44.5 Z" fill="#e8f4ec" opacity="0.55"/>

  <!-- Center hub — layered for depth -->
  <circle cx="50" cy="50" r="4.5" fill="#0d1a0f"/>
  <circle cx="50" cy="50" r="3.2" fill="#e8f4ec" opacity="0.9"/>
  <circle cx="50" cy="50" r="1.6" fill="#6dba88"/>
</svg>
