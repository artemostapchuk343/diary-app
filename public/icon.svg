<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
    <clipPath id="clip">
      <rect width="100" height="100" rx="22"/>
    </clipPath>
    <linearGradient id="barGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c8e6d0"/>
      <stop offset="100%" stop-color="#7bbf94"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="#0e1310"/>

  <!-- Background glow blobs — matching app radial gradients -->
  <g clip-path="url(#clip)">
    <ellipse cx="-2" cy="102" rx="82" ry="68" fill="#134525" opacity="0.9" filter="url(#glow)"/>
    <ellipse cx="108" cy="-4" rx="72" ry="70" fill="#225234" opacity="0.7" filter="url(#glow)"/>
  </g>

  <!-- LEFT PANEL: Finance — tall bar chart -->
  <rect x="11" y="15" width="36" height="70" rx="7" fill="#ffffff" opacity="0.055"/>
  <rect x="11" y="15" width="36" height="70" rx="7" fill="none" stroke="#b0dcc4" stroke-width="1.2" opacity="0.35"/>
  <!-- Bar chart bars -->
  <rect x="17" y="57" width="7" height="20" rx="2.5" fill="url(#barGrad)" opacity="0.95"/>
  <rect x="26" y="46" width="7" height="31" rx="2.5" fill="url(#barGrad)" opacity="0.8"/>
  <rect x="35" y="51" width="7" height="26" rx="2.5" fill="url(#barGrad)" opacity="0.65"/>
  <!-- Label lines at top of finance panel -->
  <line x1="17" y1="25" x2="40" y2="25" stroke="#c8e6d0" stroke-width="1.8" stroke-linecap="round" opacity="0.55"/>
  <line x1="17" y1="32" x2="33" y2="32" stroke="#c8e6d0" stroke-width="1.8" stroke-linecap="round" opacity="0.3"/>

  <!-- TOP-RIGHT PANEL: Journal — text lines with pen dot -->
  <rect x="54" y="15" width="35" height="31" rx="7" fill="#ffffff" opacity="0.055"/>
  <rect x="54" y="15" width="35" height="31" rx="7" fill="none" stroke="#b0dcc4" stroke-width="1.2" opacity="0.35"/>
  <line x1="62" y1="25" x2="81" y2="25" stroke="#e8f4ec" stroke-width="2.2" stroke-linecap="round" opacity="0.85"/>
  <line x1="62" y1="32" x2="76" y2="32" stroke="#e8f4ec" stroke-width="2.2" stroke-linecap="round" opacity="0.55"/>
  <circle cx="62" cy="25" r="2.2" fill="#7bbf94" opacity="0.9"/>

  <!-- BOTTOM-RIGHT PANEL: Travel — globe outline -->
  <rect x="54" y="54" width="35" height="31" rx="7" fill="#ffffff" opacity="0.055"/>
  <rect x="54" y="54" width="35" height="31" rx="7" fill="none" stroke="#b0dcc4" stroke-width="1.2" opacity="0.35"/>
  <!-- Globe: circle + equator line + longitude arc -->
  <circle cx="71.5" cy="69.5" r="8" fill="none" stroke="#e8f4ec" stroke-width="1.8" opacity="0.8"/>
  <line x1="63.5" y1="69.5" x2="79.5" y2="69.5" stroke="#e8f4ec" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <path d="M71.5 61.5 Q75.5 69.5 71.5 77.5 Q67.5 69.5 71.5 61.5" fill="none" stroke="#e8f4ec" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
</svg>
