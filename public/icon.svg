<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <filter id="bg-glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <clipPath id="clip">
      <rect width="100" height="100" rx="22"/>
    </clipPath>
  </defs>

  <rect width="100" height="100" rx="22" fill="#070c08"/>

  <g clip-path="url(#clip)">
    <ellipse cx="10" cy="90" rx="65" ry="55" fill="#134525" opacity="0.7" filter="url(#bg-glow)"/>
    <ellipse cx="90" cy="12" rx="55" ry="52" fill="#225234" opacity="0.55" filter="url(#bg-glow)"/>
  </g>

  <!-- Compass ring — thick, high contrast -->
  <circle cx="50" cy="50" r="30" fill="none" stroke="#e8f4ec" stroke-width="2.2" opacity="0.55"/>

  <!-- Diagonal tick marks -->
  <line x1="69.2" y1="28.8" x2="71.8" y2="26.2" stroke="#e8f4ec" stroke-width="1.8" opacity="0.5" stroke-linecap="round"/>
  <line x1="71.8" y1="73.8" x2="69.2" y2="71.2" stroke="#e8f4ec" stroke-width="1.8" opacity="0.5" stroke-linecap="round"/>
  <line x1="30.8" y1="71.2" x2="28.2" y2="73.8" stroke="#e8f4ec" stroke-width="1.8" opacity="0.5" stroke-linecap="round"/>
  <line x1="28.2" y1="26.2" x2="30.8" y2="28.8" stroke="#e8f4ec" stroke-width="1.8" opacity="0.5" stroke-linecap="round"/>

  <!-- NORTH — red -->
  <path d="M50 20 L55.5 50 L50 44 L44.5 50 Z" fill="#e03535"/>

  <!-- SOUTH — bright white -->
  <path d="M50 80 L54.5 50 L50 56 L45.5 50 Z" fill="#e8f4ec" opacity="0.85"/>

  <!-- EAST — bright white -->
  <path d="M80 50 L50 44.5 L56 50 L50 55.5 Z" fill="#e8f4ec" opacity="0.75"/>

  <!-- WEST — bright white -->
  <path d="M20 50 L50 55.5 L44 50 L50 44.5 Z" fill="#e8f4ec" opacity="0.75"/>

  <!-- Center hub -->
  <circle cx="50" cy="50" r="4" fill="#070c08"/>
  <circle cx="50" cy="50" r="2.8" fill="#e8f4ec"/>
  <circle cx="50" cy="50" r="1.4" fill="#e03535"/>
</svg>
