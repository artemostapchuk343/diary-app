  <line x1="43" y1="71" x2="57" y2="71" stroke="url(#grad)" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <path d="M62 16 L62 38 L70.5 32 L79 38 L79 16 Z" fill="url(#grad)"/>
