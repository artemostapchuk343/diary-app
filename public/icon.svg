<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <filter id="bg-glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="point-glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <clipPath id="clip">
      <rect width="100" height="100" rx="22"/>
    </clipPath>
    <!-- Glass border: bright top-left fading to dim bottom-right -->
    <linearGradient id="glass-border" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="40%"  stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.05"/>
    </linearGradient>
    <!-- Subtle top sheen -->
    <linearGradient id="top-sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.09"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="100" height="100" rx="22" fill="#070c08"/>

  <g clip-path="url(#clip)">
    <ellipse cx="10" cy="90" rx="65" ry="55" fill="#134525" opacity="0.7" filter="url(#bg-glow)"/>
    <ellipse cx="90" cy="12" rx="55" ry="52" fill="#225234" opacity="0.55" filter="url(#bg-glow)"/>
  </g>

  <!-- Ring -->
  <circle cx="50" cy="50" r="36" fill="none" stroke="#e8f4ec" stroke-width="2.2" opacity="0.55"/>

  <!-- Diagonal ticks -->
  <line x1="73.8" y1="25.0" x2="76.9" y2="22.1" stroke="#e8f4ec" stroke-width="1.8" opacity="0.5" stroke-linecap="round"/>
  <line x1="76.9" y1="77.9" x2="73.8" y2="75.0" stroke="#e8f4ec" stroke-width="1.8" opacity="0.5" stroke-linecap="round"/>
  <line x1="26.2" y1="75.0" x2="23.1" y2="77.9" stroke="#e8f4ec" stroke-width="1.8" opacity="0.5" stroke-linecap="round"/>
  <line x1="23.1" y1="22.1" x2="26.2" y2="25.0" stroke="#e8f4ec" stroke-width="1.8" opacity="0.5" stroke-linecap="round"/>

  <!-- NORTH — red -->
  <path d="M50 14 L56.5 50 L50 43 L43.5 50 Z" fill="#e03535"/>
  <path d="M50 14 L56.5 50 L50 43 L43.5 50 Z" fill="#e03535" filter="url(#point-glow)" opacity="0.45"/>

  <!-- SOUTH -->
  <path d="M50 86 L43.5 50 L50 57 L56.5 50 Z" fill="#e8f4ec" opacity="0.85"/>

  <!-- EAST -->
  <path d="M86 50 L50 43.5 L57 50 L50 56.5 Z" fill="#e8f4ec" opacity="0.75"/>

  <!-- WEST -->
  <path d="M14 50 L50 56.5 L43 50 L50 43.5 Z" fill="#e8f4ec" opacity="0.75"/>

  <!-- Glass border outline -->
  <rect x="0.75" y="0.75" width="98.5" height="98.5" rx="21.5" fill="none" stroke="url(#glass-border)" stroke-width="1.5"/>
  <!-- Top sheen -->
  <rect x="0" y="0" width="100" height="50" rx="22" fill="url(#top-sheen)" clip-path="url(#clip)"/>

  <!-- Center hub -->
  <circle cx="50" cy="50" r="4.5" fill="#070c08"/>
  <circle cx="50" cy="50" r="3.2" fill="#e8f4ec" opacity="0.9"/>
  <circle cx="50" cy="50" r="1.6" fill="#e03535"/>
</svg>
